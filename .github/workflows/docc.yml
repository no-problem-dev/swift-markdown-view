name: Deploy DocC to GitHub Pages

# DocC の生成物は git に入れない。以前は gh-pages ブランチへ push しており、
# 生成物のみのブランチに 38 コミットが積み上がってリポジトリが 668 MB に達していた。
# SPM は full clone するため、これを全利用者が引くことになる。
# Actions の artifact 経由でデプロイすれば、ドキュメントは履歴に一切入らない。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-docc"
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Create docs directory
        run: mkdir -p ./docs

      - name: Build Combined Documentation
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --enable-experimental-combined-documentation \
            --target SwiftMarkdownView \
            --target SwiftMarkdownViewHighlightJS \
            --target SwiftMarkdownViewLaTeX \
            --target SwiftMarkdownEditor \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path swift-markdown-view \
            --output-path ./docs

      - name: Inject package overview into combined root
        run: |
          python3 - ./docs swiftmarkdownview <<'PY'
          import json, os, sys
          docs, core = sys.argv[1], sys.argv[2].lower()
          root_p = os.path.join(docs, "data", "documentation.json")
          core_p = os.path.join(docs, "data", "documentation", f"{core}.json")
          if not (os.path.exists(root_p) and os.path.exists(core_p)):
              print("skip: missing root/core json"); sys.exit(0)
          root = json.load(open(root_p)); cm = json.load(open(core_p))
          if root.get("abstract"):
              print("skip: root already has abstract"); sys.exit(0)
          if cm.get("abstract"): root["abstract"] = cm["abstract"]
          ov = next((s for s in cm.get("primaryContentSections", []) if s.get("kind") == "content"), None)
          if ov:
              for k, v in cm.get("references", {}).items():
                  root.setdefault("references", {}).setdefault(k, v)
              root.setdefault("primaryContentSections", []).insert(0, ov)
          json.dump(root, open(root_p, "w"), ensure_ascii=False)
          print("injected overview from", core)
          PY

      # 静的ホスティングでは使わない。他の DocC カタログから参照させるための索引で、
      # 合わせて 60 MB を超える。
      - name: Drop cross-catalog link indexes
        run: rm -f ./docs/linkable-entities.json ./docs/link-hierarchy.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    name: Deploy
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
